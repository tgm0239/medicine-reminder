name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Write correct buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = 吃药提醒
package.name = medicinereminder
package.domain = org.yourname
source.dir = .
source.include_exts = py,png,jpg,kv,ttf,java,xml
version = 1.0.0
requirements = python3,kivy,sqlite3,plyer,pyjnius,android
orientation = portrait
fullscreen = 0
android.permissions = INTERNET, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED
android.api = 33
android.minapi = 21
android.ndk = 25b
android.sdk = 33
android.build_tools = 33.0.2
android.add_src = .
android.manifest = AndroidManifest.tmpl.xml
icon.filename = %(source.dir)s/icon.png
[buildozer]
log_level = 2
warn_on_root = 1
EOF
      - name: Build APK with Buildozer
        run: |
          cd $GITHUB_WORKSPACE
          yes | buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./bin/*.apk
