name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Write correct buildozer.spec
        run: |
          # ... 您的 buildozer.spec 写入内容 ...
      - name: Build APK with Buildozer
        id: build
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE
          yes | buildozer -v android debug 2>&1 | tee full_build.log
      - name: Extract error lines
        if: steps.build.outcome == 'failure'
        run: |
          grep -i -E 'error|failed|traceback|exception' full_build.log | head -200 > errors.txt
      - name: Upload error summary
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: error-summary
          path: errors.txt
      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./bin/*.apk
