name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      # 写入正确的 buildozer.spec（逐行 echo，避免 YAML 错误）
      - name: Write correct buildozer.spec
        run: |
          echo "[app]" > buildozer.spec
          echo "" >> buildozer.spec
          echo "# 应用名称" >> buildozer.spec
          echo "title = 吃药提醒" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 包名" >> buildozer.spec
          echo "package.name = medicinereminder" >> buildozer.spec
          echo "package.domain = org.yourname" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 源码目录" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "source.include_exts = py,png,jpg,kv,ttf,java,xml" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 版本号" >> buildozer.spec
          echo "version = 1.0.0" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 依赖库" >> buildozer.spec
          echo "requirements = python3,kivy,sqlite3,plyer,pyjnius,pygame,android" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 屏幕方向" >> buildozer.spec
          echo "orientation = portrait" >> buildozer.spec
          echo "fullscreen = 0" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# Android 权限" >> buildozer.spec
          echo "android.permissions = INTERNET, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# SDK/NDK 版本" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.sdk = 33" >> buildozer.spec
          echo "android.build_tools = 33.0.2" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 包含 Java 源码" >> buildozer.spec
          echo "android.add_src = ." >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 使用自定义 AndroidManifest" >> buildozer.spec
          echo "android.manifest = AndroidManifest.tmpl.xml" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 图标（如果有）" >> buildozer.spec
          echo "icon.filename = %(source.dir)s/icon.png" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[buildozer]" >> buildozer.spec
          echo "log_level = 2" >> buildozer.spec
          echo "warn_on_root = 1" >> buildozer.spec

      # 以 root 身份安装必要工具并手动下载 Android SDK（避免 wget 缺失）
      - name: Setup Android SDK (as root)
        run: |
          apt-get update && apt-get install -y curl unzip
          export ANDROID_HOME=/home/user/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -O https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          # 接受所有许可证
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          # 安装必要的构建工具
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      # 创建 builder 用户并设置权限
      - name: Create builder user and set permissions
        run: |
          useradd -m -s /bin/bash builder
          chown -R builder:builder $GITHUB_WORKSPACE
          chown -R builder:builder /home/user/.buildozer

      # 以 builder 用户身份构建 APK
      - name: Build APK as builder
        run: |
          sudo -u builder bash -c "
            export ANDROID_HOME=/home/user/.buildozer/android/platform/android-sdk
            export PATH=\$ANDROID_HOME/cmdline-tools/latest/bin:\$PATH
            cd $GITHUB_WORKSPACE
            # 创建 Python 虚拟环境并安装 buildozer
            python3 -m venv /home/builder/buildozer-venv
            source /home/builder/buildozer-venv/bin/activate
            pip install --upgrade pip setuptools wheel
            pip install buildozer cython
            buildozer -v android debug
          "

      # 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./bin/*.apk
