name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      # 写入正确的 buildozer.spec（已移除 pygame，注释 icon）
      - name: Write correct buildozer.spec
        run: |
          echo "[app]" > buildozer.spec
          echo "title = 吃药提醒" >> buildozer.spec
          echo "package.name = medicinereminder" >> buildozer.spec
          echo "package.domain = org.yourname" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "source.include_exts = py,png,jpg,kv,ttf,java,xml" >> buildozer.spec
          echo "version = 1.0.0" >> buildozer.spec
          echo "requirements = python3,kivy,sqlite3,plyer,pyjnius,android" >> buildozer.spec
          echo "orientation = portrait" >> buildozer.spec
          echo "fullscreen = 0" >> buildozer.spec
          echo "android.permissions = INTERNET, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.sdk = 33" >> buildozer.spec
          echo "android.build_tools = 33.0.2" >> buildozer.spec
          echo "android.add_src = ." >> buildozer.spec
          echo "android.manifest = AndroidManifest.tmpl.xml" >> buildozer.spec
          echo "# icon.filename = %(source.dir)s/icon.png" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[buildozer]" >> buildozer.spec
          echo "log_level = 2" >> buildozer.spec
          echo "warn_on_root = 1" >> buildozer.spec

      # 构建 APK（即使失败也继续，用于后续收集日志）
      - name: Build APK with Buildozer
        id: build
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE
          yes | buildozer -v android debug 2>&1 | tee full_build.log

      # 查找所有生成的 APK 文件
      - name: Find APK files
        id: find_apk
        run: |
          echo "Searching for APK files..."
          find $GITHUB_WORKSPACE -name "*.apk" -type f > apk_list.txt
          cat apk_list.txt
          if [ -s apk_list.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # 如果找到 APK 文件，将它们打包上传
      - name: Upload APK
        if: steps.find_apk.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: $(cat apk_list.txt)

      # 如果构建失败且没有 APK，上传完整日志以便调试
      - name: Upload full build log on failure
        if: steps.build.outcome == 'failure' && steps.find_apk.outputs.found == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: full_build.log

      # 如果构建失败，也提取错误摘要
      - name: Extract error summary on failure
        if: steps.build.outcome == 'failure'
        run: |
          grep -i -E 'error|failed|traceback|exception' full_build.log | tail -50 > error_summary.txt || true
      - name: Upload error summary
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: error-summary
          path: error_summary.txt
