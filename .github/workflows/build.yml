name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Write correct buildozer.spec
        run: |
          echo "[app]" > buildozer.spec
          echo "" >> buildozer.spec
          echo "# 应用名称" >> buildozer.spec
          echo "title = 吃药提醒" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 包名" >> buildozer.spec
          echo "package.name = medicinereminder" >> buildozer.spec
          echo "package.domain = org.yourname" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 源码目录" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "source.include_exts = py,png,jpg,kv,ttf,java,xml" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 版本号" >> buildozer.spec
          echo "version = 1.0.0" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 依赖库" >> buildozer.spec
          echo "requirements = python3,kivy,sqlite3,plyer,pyjnius,pygame,android" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 屏幕方向" >> buildozer.spec
          echo "orientation = portrait" >> buildozer.spec
          echo "fullscreen = 0" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# Android 权限" >> buildozer.spec
          echo "android.permissions = INTERNET, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# SDK/NDK 版本" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.sdk = 33" >> buildozer.spec
          echo "android.build_tools = 33.0.2" >> buildozer.spec
          echo "# android.ndk_path = /home/user/.buildozer/android/platform/android-ndk-r25b" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 包含 Java 源码" >> buildozer.spec
          echo "android.add_src = ." >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 使用自定义 AndroidManifest" >> buildozer.spec
          echo "android.manifest = AndroidManifest.tmpl.xml" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "# 图标（如果有）" >> buildozer.spec
          echo "icon.filename = %(source.dir)s/icon.png" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[buildozer]" >> buildozer.spec
          echo "log_level = 2" >> buildozer.spec
          echo "warn_on_root = 1" >> buildozer.spec
      - name: Build APK with Buildozer (non-root)
        run: |
          # 创建一个普通用户 builder
          useradd -m -s /bin/bash builder
          # 将工作目录的所有权给 builder
          chown -R builder:builder $GITHUB_WORKSPACE
          # 切换到 builder 用户并运行 buildozer
          sudo -u builder bash -c "cd $GITHUB_WORKSPACE && /home/user/.venv/bin/buildozer -v android debug"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ./bin/*.apk
